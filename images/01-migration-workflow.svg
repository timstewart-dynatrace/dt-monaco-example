<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFB800"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Configuration Migration Workflow</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Full tenant migration with automatic backup and validation</text>

  <!-- Main pipeline -->

  <!-- Stage 1: Source Tenant -->
  <rect x="30" y="140" width="150" height="90" fill="#73BE28" opacity="0.08" stroke="#73BE28" stroke-width="1.5" rx="8"/>
  <text x="105" y="172" text-anchor="middle" fill="#86EFAC" font-size="14" font-weight="700">Source Tenant</text>
  <text x="105" y="192" text-anchor="middle" fill="#94A3B8" font-size="11">All configurations</text>
  <text x="105" y="207" text-anchor="middle" fill="#94A3B8" font-size="11">23+ config types</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="185" x2="215" y2="185" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Monaco Download -->
  <rect x="220" y="140" width="150" height="90" fill="#1E293B" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <text x="295" y="165" text-anchor="middle" fill="#BFDBFE" font-size="12" font-weight="700">STEP 1</text>
  <text x="295" y="185" text-anchor="middle" fill="#BFDBFE" font-size="14" font-weight="700">Download</text>
  <text x="295" y="205" text-anchor="middle" fill="#94A3B8" font-size="11">monaco download</text>
  <text x="295" y="220" text-anchor="middle" fill="#94A3B8" font-size="11">→ Local YAML</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="185" x2="405" y2="185" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Validate -->
  <rect x="410" y="140" width="150" height="90" fill="#1E293B" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <text x="485" y="165" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="700">STEP 2</text>
  <text x="485" y="185" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="700">Validate</text>
  <text x="485" y="205" text-anchor="middle" fill="#94A3B8" font-size="11">YAML syntax check</text>
  <text x="485" y="220" text-anchor="middle" fill="#94A3B8" font-size="11">Schema validation</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="185" x2="595" y2="185" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Deploy -->
  <rect x="600" y="140" width="150" height="90" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
  <text x="675" y="165" text-anchor="middle" fill="#A5F3FC" font-size="12" font-weight="700">STEP 3</text>
  <text x="675" y="185" text-anchor="middle" fill="#A5F3FC" font-size="14" font-weight="700">Deploy</text>
  <text x="675" y="205" text-anchor="middle" fill="#94A3B8" font-size="11">monaco deploy</text>
  <text x="675" y="220" text-anchor="middle" fill="#94A3B8" font-size="11">→ Target tenant</text>

  <!-- Arrow 4 -->
  <line x1="750" y1="185" x2="785" y2="185" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: Target Tenant -->
  <rect x="790" y="140" width="110" height="90" fill="#22D3EE" opacity="0.08" stroke="#22D3EE" stroke-width="1.5" rx="8"/>
  <text x="845" y="175" text-anchor="middle" fill="#A5F3FC" font-size="14" font-weight="700">Target</text>
  <text x="845" y="195" text-anchor="middle" fill="#A5F3FC" font-size="14" font-weight="700">Tenant</text>
  <text x="845" y="215" text-anchor="middle" fill="#94A3B8" font-size="11">Updated</text>

  <!-- Backup branch (below main pipeline) -->
  <line x1="845" y1="230" x2="845" y2="280" stroke="#FFB800" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="845" y1="280" x2="845" y2="310" stroke="#FFB800" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="760" y="315" width="170" height="70" fill="#FFB800" opacity="0.08" stroke="#FFB800" stroke-width="1.5" rx="8"/>
  <text x="845" y="340" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">Safety Backup</text>
  <text x="845" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">Target config saved</text>
  <text x="845" y="373" text-anchor="middle" fill="#94A3B8" font-size="11">before any changes</text>

  <!-- Dry-run indicator -->
  <rect x="30" y="295" width="260" height="90" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="160" y="320" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="700">Dry-Run Mode</text>
  <text x="160" y="340" text-anchor="middle" fill="#94A3B8" font-size="11">Preview all changes without applying.</text>
  <text x="160" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">Steps 1-2 run normally; Step 3 is</text>
  <text x="160" y="375" text-anchor="middle" fill="#94A3B8" font-size="11">skipped with a summary of what would change.</text>

  <!-- Config types indicator -->
  <rect x="320" y="295" width="260" height="90" fill="#1E293B" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="450" y="320" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="700">Selective Migration</text>
  <text x="450" y="340" text-anchor="middle" fill="#94A3B8" font-size="11">Use --config-types to migrate specific</text>
  <text x="450" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">configuration types only, or migrate</text>
  <text x="450" y="375" text-anchor="middle" fill="#94A3B8" font-size="11">all 23+ types at once (default).</text>

  <!-- Languages footer -->
  <line x1="30" y1="420" x2="900" y2="420" stroke="#334155" stroke-width="1"/>

  <rect x="190" y="435" width="100" height="28" fill="#1E293B" stroke="#73BE28" stroke-width="1" rx="4"/>
  <text x="240" y="454" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">Python</text>

  <rect x="310" y="435" width="100" height="28" fill="#1E293B" stroke="#1496FF" stroke-width="1" rx="4"/>
  <text x="360" y="454" text-anchor="middle" fill="#BFDBFE" font-size="11" font-weight="600">Bash</text>

  <rect x="430" y="435" width="100" height="28" fill="#1E293B" stroke="#A78BFA" stroke-width="1" rx="4"/>
  <text x="480" y="454" text-anchor="middle" fill="#DDD6FE" font-size="11" font-weight="600">PowerShell</text>

  <text x="595" y="454" text-anchor="start" fill="#94A3B8" font-size="11">Same workflow, identical results</text>
</svg>