<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <defs>
    <marker id="s2s-arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="s2s-arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#73BE28"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">SaaS-to-SaaS Export Pipeline</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Export configurations from a SaaS tenant for migration via SaaS Upgrade Assistant</text>

  <!-- Main pipeline: 6 steps in 2 rows -->

  <!-- Step 1: Validate Inputs -->
  <rect x="30" y="95" width="190" height="110" fill="#1E293B" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <circle cx="55" cy="115" r="12" fill="#1496FF" opacity="0.2" stroke="#1496FF" stroke-width="1"/>
  <text x="55" y="120" text-anchor="middle" fill="#BFDBFE" font-size="12" font-weight="700">1</text>
  <text x="140" y="120" text-anchor="middle" fill="#BFDBFE" font-size="13" font-weight="700">Validate</text>
  <text x="125" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">Check tenant ID</text>
  <text x="125" y="162" text-anchor="middle" fill="#94A3B8" font-size="11">Check ENV_TOKEN set</text>
  <text x="125" y="179" text-anchor="middle" fill="#94A3B8" font-size="11">Detect OS/platform</text>

  <line x1="220" y1="150" x2="245" y2="150" stroke="#64748B" stroke-width="1.5" marker-end="url(#s2s-arrow)"/>

  <!-- Step 2: Download Monaco -->
  <rect x="250" y="95" width="190" height="110" fill="#1E293B" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <circle cx="275" cy="115" r="12" fill="#1496FF" opacity="0.2" stroke="#1496FF" stroke-width="1"/>
  <text x="275" y="120" text-anchor="middle" fill="#BFDBFE" font-size="12" font-weight="700">2</text>
  <text x="365" y="120" text-anchor="middle" fill="#BFDBFE" font-size="13" font-weight="700">Get Monaco</text>
  <text x="345" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">Download binary</text>
  <text x="345" y="162" text-anchor="middle" fill="#94A3B8" font-size="11">for OS/arch</text>
  <text x="345" y="179" text-anchor="middle" fill="#94A3B8" font-size="11">SHA-256 checksum verify</text>

  <line x1="440" y1="150" x2="465" y2="150" stroke="#64748B" stroke-width="1.5" marker-end="url(#s2s-arrow)"/>

  <!-- Step 3: Generate Token -->
  <rect x="470" y="95" width="190" height="110" fill="#1E293B" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <circle cx="495" cy="115" r="12" fill="#FFB800" opacity="0.2" stroke="#FFB800" stroke-width="1"/>
  <text x="495" y="120" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="700">3</text>
  <text x="585" y="120" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">Gen Token</text>
  <text x="565" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">POST /api/v2/apiTokens</text>
  <text x="565" y="162" text-anchor="middle" fill="#94A3B8" font-size="11">18 scoped permissions</text>
  <text x="565" y="179" text-anchor="middle" fill="#94A3B8" font-size="11">Store token ID for revoke</text>

  <line x1="660" y1="150" x2="685" y2="150" stroke="#64748B" stroke-width="1.5" marker-end="url(#s2s-arrow)"/>

  <!-- Step 4: Export Config -->
  <rect x="690" y="95" width="210" height="110" fill="#1E293B" stroke="#73BE28" stroke-width="1.5" rx="6"/>
  <circle cx="715" cy="115" r="12" fill="#73BE28" opacity="0.2" stroke="#73BE28" stroke-width="1"/>
  <text x="715" y="120" text-anchor="middle" fill="#86EFAC" font-size="12" font-weight="700">4</text>
  <text x="815" y="120" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">Export Config</text>
  <text x="795" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">monaco download</text>
  <text x="795" y="162" text-anchor="middle" fill="#94A3B8" font-size="11">All config types from</text>
  <text x="795" y="179" text-anchor="middle" fill="#94A3B8" font-size="11">source SaaS tenant</text>

  <!-- Row connector -->
  <line x1="795" y1="205" x2="795" y2="240" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="795" y1="240" x2="125" y2="240" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="125" y1="240" x2="125" y2="265" stroke="#64748B" stroke-width="1.5" marker-end="url(#s2s-arrow)"/>

  <!-- Step 5: Package Archive -->
  <rect x="30" y="270" width="280" height="110" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
  <circle cx="55" cy="290" r="12" fill="#22D3EE" opacity="0.2" stroke="#22D3EE" stroke-width="1"/>
  <text x="55" y="295" text-anchor="middle" fill="#A5F3FC" font-size="12" font-weight="700">5</text>
  <text x="185" y="295" text-anchor="middle" fill="#A5F3FC" font-size="13" font-weight="700">Package Archive</text>
  <text x="170" y="320" text-anchor="middle" fill="#94A3B8" font-size="11">Create exportMetadata.json</text>
  <text x="170" y="337" text-anchor="middle" fill="#94A3B8" font-size="11">Bundle into tar.gz (Bash/Python)</text>
  <text x="170" y="354" text-anchor="middle" fill="#94A3B8" font-size="11">or .zip (PowerShell)</text>
  <text x="170" y="371" text-anchor="middle" fill="#94A3B8" font-size="11">SUA-compatible format</text>

  <line x1="310" y1="325" x2="345" y2="325" stroke="#64748B" stroke-width="1.5" marker-end="url(#s2s-arrow)"/>

  <!-- Step 6: Revoke + Cleanup -->
  <rect x="350" y="270" width="280" height="110" fill="#1E293B" stroke="#DE350B" stroke-width="1.5" rx="6"/>
  <circle cx="375" cy="290" r="12" fill="#DE350B" opacity="0.2" stroke="#DE350B" stroke-width="1"/>
  <text x="375" y="295" text-anchor="middle" fill="#FCA5A5" font-size="12" font-weight="700">6</text>
  <text x="510" y="295" text-anchor="middle" fill="#FCA5A5" font-size="13" font-weight="700">Revoke + Cleanup</text>
  <text x="490" y="320" text-anchor="middle" fill="#94A3B8" font-size="11">DELETE /api/v2/apiTokens/{id}</text>
  <text x="490" y="337" text-anchor="middle" fill="#94A3B8" font-size="11">Remove temporary Monaco binary</text>
  <text x="490" y="354" text-anchor="middle" fill="#94A3B8" font-size="11">Remove manifest.yaml</text>
  <text x="490" y="371" text-anchor="middle" fill="#94A3B8" font-size="11">Remove checksum files</text>

  <!-- Output arrow -->
  <line x1="630" y1="325" x2="665" y2="325" stroke="#73BE28" stroke-width="2" marker-end="url(#s2s-arrow-green)"/>

  <!-- Output: Archive -->
  <rect x="670" y="270" width="230" height="110" fill="#73BE28" opacity="0.08" stroke="#73BE28" stroke-width="2" rx="8"/>
  <text x="785" y="298" text-anchor="middle" fill="#86EFAC" font-size="15" font-weight="700">Output</text>
  <text x="785" y="322" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="600">configurationExport-</text>
  <text x="785" y="339" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="600">YYYY-MM-DD_HH-MM-SS</text>
  <text x="785" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">.tar.gz / .zip</text>
  <text x="785" y="375" text-anchor="middle" fill="#94A3B8" font-size="10">Ready for SaaS Upgrade Assistant</text>

  <!-- Footer -->
  <line x1="30" y1="410" x2="900" y2="410" stroke="#334155" stroke-width="1"/>

  <text x="465" y="435" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="600">Next Steps After Export</text>
  <rect x="120" y="448" width="200" height="28" fill="#1E293B" stroke="#1496FF" stroke-width="1" rx="4"/>
  <text x="220" y="467" text-anchor="middle" fill="#BFDBFE" font-size="11">Extract archive</text>

  <line x1="320" y1="462" x2="350" y2="462" stroke="#64748B" stroke-width="1" marker-end="url(#s2s-arrow)"/>

  <rect x="355" y="448" width="200" height="28" fill="#1E293B" stroke="#FFB800" stroke-width="1" rx="4"/>
  <text x="455" y="467" text-anchor="middle" fill="#FCD34D" font-size="11">Review configurations</text>

  <line x1="555" y1="462" x2="585" y2="462" stroke="#64748B" stroke-width="1" marker-end="url(#s2s-arrow)"/>

  <rect x="590" y="448" width="220" height="28" fill="#1E293B" stroke="#22D3EE" stroke-width="1" rx="4"/>
  <text x="700" y="467" text-anchor="middle" fill="#A5F3FC" font-size="11">monaco deploy to target</text>
</svg>