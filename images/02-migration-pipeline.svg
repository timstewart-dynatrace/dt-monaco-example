<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <defs>
    <marker id="pipe-arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Full Tenant Migration — 7-Step Pipeline</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Each step runs automatically with comprehensive error handling</text>

  <!-- Row 1: Steps 1-4 -->

  <!-- Step 1: Verify -->
  <rect x="30" y="90" width="200" height="130" fill="#1E293B" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <rect x="30" y="90" width="200" height="28" fill="#1496FF" opacity="0.15" rx="6"/>
  <rect x="30" y="112" width="200" height="6" fill="#1E293B"/>
  <text x="55" y="110" fill="#BFDBFE" font-size="12" font-weight="700">STEP 1</text>
  <text x="200" y="110" text-anchor="end" fill="#64748B" font-size="10">Prerequisites</text>
  <text x="130" y="143" text-anchor="middle" fill="#BFDBFE" font-size="14" font-weight="700">Verify</text>
  <text x="130" y="163" text-anchor="middle" fill="#94A3B8" font-size="11">Monaco CLI installed?</text>
  <text x="130" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">Tokens valid?</text>
  <text x="130" y="197" text-anchor="middle" fill="#94A3B8" font-size="11">Connectivity OK?</text>

  <!-- Arrow -->
  <line x1="230" y1="155" x2="250" y2="155" stroke="#64748B" stroke-width="1.5" marker-end="url(#pipe-arrow)"/>

  <!-- Step 2: Configure -->
  <rect x="255" y="90" width="200" height="130" fill="#1E293B" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <rect x="255" y="90" width="200" height="28" fill="#1496FF" opacity="0.15" rx="6"/>
  <rect x="255" y="112" width="200" height="6" fill="#1E293B"/>
  <text x="280" y="110" fill="#BFDBFE" font-size="12" font-weight="700">STEP 2</text>
  <text x="425" y="110" text-anchor="end" fill="#64748B" font-size="10">Setup</text>
  <text x="355" y="143" text-anchor="middle" fill="#BFDBFE" font-size="14" font-weight="700">Configure</text>
  <text x="355" y="163" text-anchor="middle" fill="#94A3B8" font-size="11">Generate</text>
  <text x="355" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">environments.yaml</text>
  <text x="355" y="197" text-anchor="middle" fill="#94A3B8" font-size="11">from .env / args</text>

  <!-- Arrow -->
  <line x1="455" y1="155" x2="475" y2="155" stroke="#64748B" stroke-width="1.5" marker-end="url(#pipe-arrow)"/>

  <!-- Step 3: Connect -->
  <rect x="480" y="90" width="200" height="130" fill="#1E293B" stroke="#73BE28" stroke-width="1.5" rx="6"/>
  <rect x="480" y="90" width="200" height="28" fill="#73BE28" opacity="0.15" rx="6"/>
  <rect x="480" y="112" width="200" height="6" fill="#1E293B"/>
  <text x="505" y="110" fill="#86EFAC" font-size="12" font-weight="700">STEP 3</text>
  <text x="650" y="110" text-anchor="end" fill="#64748B" font-size="10">Verify APIs</text>
  <text x="580" y="143" text-anchor="middle" fill="#86EFAC" font-size="14" font-weight="700">Connect</text>
  <text x="580" y="163" text-anchor="middle" fill="#94A3B8" font-size="11">Test source tenant API</text>
  <text x="580" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">Test target tenant API</text>
  <text x="580" y="197" text-anchor="middle" fill="#94A3B8" font-size="11">Validate token scopes</text>

  <!-- Arrow -->
  <line x1="680" y1="155" x2="700" y2="155" stroke="#64748B" stroke-width="1.5" marker-end="url(#pipe-arrow)"/>

  <!-- Step 4: Backup -->
  <rect x="705" y="90" width="200" height="130" fill="#1E293B" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <rect x="705" y="90" width="200" height="28" fill="#FFB800" opacity="0.15" rx="6"/>
  <rect x="705" y="112" width="200" height="6" fill="#1E293B"/>
  <text x="730" y="110" fill="#FCD34D" font-size="12" font-weight="700">STEP 4</text>
  <text x="875" y="110" text-anchor="end" fill="#64748B" font-size="10">Safety</text>
  <text x="805" y="143" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="700">Backup</text>
  <text x="805" y="163" text-anchor="middle" fill="#94A3B8" font-size="11">Download target config</text>
  <text x="805" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">Save timestamped copy</text>
  <text x="805" y="197" text-anchor="middle" fill="#94A3B8" font-size="11">config/backups/YYYYMMDD</text>

  <!-- Row connector -->
  <line x1="805" y1="220" x2="805" y2="260" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="805" y1="260" x2="130" y2="260" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="130" y1="260" x2="130" y2="280" stroke="#64748B" stroke-width="1.5" marker-end="url(#pipe-arrow)"/>

  <!-- Row 2: Steps 5-7 -->

  <!-- Step 5: Download -->
  <rect x="30" y="285" width="270" height="130" fill="#1E293B" stroke="#73BE28" stroke-width="1.5" rx="6"/>
  <rect x="30" y="285" width="270" height="28" fill="#73BE28" opacity="0.15" rx="6"/>
  <rect x="30" y="307" width="270" height="6" fill="#1E293B"/>
  <text x="55" y="305" fill="#86EFAC" font-size="12" font-weight="700">STEP 5</text>
  <text x="270" y="305" text-anchor="end" fill="#64748B" font-size="10">Source</text>
  <text x="165" y="338" text-anchor="middle" fill="#86EFAC" font-size="14" font-weight="700">Download Source Config</text>
  <text x="165" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">monaco download --environment source</text>
  <text x="165" y="378" text-anchor="middle" fill="#94A3B8" font-size="11">All 23+ configuration types</text>
  <text x="165" y="398" text-anchor="middle" fill="#94A3B8" font-size="11">(or filtered with --config-types)</text>

  <!-- Arrow -->
  <line x1="300" y1="350" x2="330" y2="350" stroke="#64748B" stroke-width="1.5" marker-end="url(#pipe-arrow)"/>

  <!-- Step 6: Validate -->
  <rect x="335" y="285" width="270" height="130" fill="#1E293B" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <rect x="335" y="285" width="270" height="28" fill="#FFB800" opacity="0.15" rx="6"/>
  <rect x="335" y="307" width="270" height="6" fill="#1E293B"/>
  <text x="360" y="305" fill="#FCD34D" font-size="12" font-weight="700">STEP 6</text>
  <text x="575" y="305" text-anchor="end" fill="#64748B" font-size="10">Quality</text>
  <text x="470" y="338" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="700">Validate Configuration</text>
  <text x="470" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">Parse all YAML files</text>
  <text x="470" y="378" text-anchor="middle" fill="#94A3B8" font-size="11">Check syntax and structure</text>
  <text x="470" y="398" text-anchor="middle" fill="#94A3B8" font-size="11">Abort on errors before deploy</text>

  <!-- Arrow -->
  <line x1="605" y1="350" x2="635" y2="350" stroke="#64748B" stroke-width="1.5" marker-end="url(#pipe-arrow)"/>

  <!-- Step 7: Deploy -->
  <rect x="640" y="285" width="270" height="130" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
  <rect x="640" y="285" width="270" height="28" fill="#22D3EE" opacity="0.15" rx="6"/>
  <rect x="640" y="307" width="270" height="6" fill="#1E293B"/>
  <text x="665" y="305" fill="#A5F3FC" font-size="12" font-weight="700">STEP 7</text>
  <text x="880" y="305" text-anchor="end" fill="#64748B" font-size="10">Target</text>
  <text x="775" y="338" text-anchor="middle" fill="#A5F3FC" font-size="14" font-weight="700">Deploy to Target</text>
  <text x="775" y="358" text-anchor="middle" fill="#94A3B8" font-size="11">monaco deploy --environment target</text>
  <text x="775" y="378" text-anchor="middle" fill="#94A3B8" font-size="11">Configurations applied to target</text>
  <text x="775" y="398" text-anchor="middle" fill="#94A3B8" font-size="11">(skipped in --dry-run mode)</text>

  <!-- Footer -->
  <line x1="30" y1="440" x2="900" y2="440" stroke="#334155" stroke-width="1"/>
  <text x="465" y="465" text-anchor="middle" fill="#94A3B8" font-size="12">Idempotent — safe to run multiple times. Backup available for rollback if needed.</text>
  <text x="465" y="485" text-anchor="middle" fill="#64748B" font-size="11">Available in Python, Bash, and PowerShell — all implementations follow this same pipeline</text>
</svg>